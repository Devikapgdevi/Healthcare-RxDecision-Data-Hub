trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - sql/*

pr:
  branches:
    include:
      - main

parameters:
  - name: environment
    displayName: 'Deployment environment'
    type: string
    default: 'development'
    values:
      - development
      - production

variables:
  SNOWFLAKE_ROLE: 'ACCOUNTADMIN'
  SNOWFLAKE_WAREHOUSE: 'COMPUTE_WH'

stages:
  - stage: Validate
    displayName: 'Validate SQL'
    jobs:
      - job: ValidateSQL
        displayName: 'Lint SQL with SQLFluff'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: pip install sqlfluff
            displayName: 'Install SQLFluff'

          - script: sqlfluff lint sql/ --dialect snowflake --ignore parsing || true
            displayName: 'Lint SQL files'

  - stage: Deploy
    displayName: 'Deploy to Snowflake'
    dependsOn: Validate
    jobs:
      - job: DeploySQL
        displayName: 'Deploy SQL Scripts'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: pip install snowflake-connector-python
            displayName: 'Install Snowflake connector'

          - script: |
              python << 'EOF'
              import snowflake.connector, os
              from pathlib import Path
              conn = snowflake.connector.connect(
                  account=os.environ['SNOWFLAKE_ACCOUNT'],
                  user=os.environ['SNOWFLAKE_USER'],
                  password=os.environ['SNOWFLAKE_PASSWORD'],
                  role='ACCOUNTADMIN', warehouse='COMPUTE_WH')
              cursor = conn.cursor()
              for f in sorted(Path('sql').glob('*.sql')):
                  if f.name != 'master_deployment.sql':
                      print(f"Executing: {f}")
                      for stmt in [s.strip() for s in f.read_text().split(';') if s.strip()]:
                          if stmt and not stmt.startswith('--'):
                              try: cursor.execute(stmt)
                              except Exception as e: print(f"Warning: {str(e)[:100]}")
              conn.close()
              print("Deployment complete!")
              EOF
            displayName: 'Deploy SQL Scripts'
            env:
              SNOWFLAKE_ACCOUNT: $(SNOWFLAKE_ACCOUNT)
              SNOWFLAKE_USER: $(SNOWFLAKE_USER)
              SNOWFLAKE_PASSWORD: $(SNOWFLAKE_PASSWORD)

  - stage: Test
    displayName: 'Run Tests'
    dependsOn: Deploy
    jobs:
      - job: RunVerification
        displayName: 'Run Verification'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: pip install snowflake-connector-python
            displayName: 'Install Snowflake connector'

          - script: |
              python << 'EOF'
              import snowflake.connector, os
              conn = snowflake.connector.connect(
                  account=os.environ['SNOWFLAKE_ACCOUNT'],
                  user=os.environ['SNOWFLAKE_USER'],
                  password=os.environ['SNOWFLAKE_PASSWORD'],
                  role='ACCOUNTADMIN', warehouse='COMPUTE_WH')
              cursor = conn.cursor()
              tests = [
                  ("PATIENT_RAW", "SELECT COUNT(*) FROM RAW_DB.RAW_SCHEMA.PATIENT_RAW", 500),
                  ("ICU_EVENTS", "SELECT COUNT(*) FROM RAW_DB.RAW_SCHEMA.ICU_EVENTS", 1500),
                  ("BILLING_DATA", "SELECT COUNT(*) FROM RAW_DB.RAW_SCHEMA.BILLING_DATA", 800),
                  ("CLEAN_PATIENT", "SELECT COUNT(*) FROM TRANSFORM_DB.TRANSFORM_SCHEMA.CLEAN_PATIENT", 400),
                  ("PATIENT_ANALYTICS", "SELECT COUNT(*) FROM ANALYTICS_DB.ANALYTICS_SCHEMA.PATIENT_ANALYTICS", 400),
                  ("PATIENT_NOTES", "SELECT COUNT(*) FROM AI_READY_DB.FEATURE_STORE.PATIENT_NOTES", 400),
              ]
              for name, query, expected in tests:
                  try:
                      cursor.execute(query)
                      result = cursor.fetchone()[0]
                      status = "PASS" if result >= expected else "FAIL"
                      print(f"{status}: {name} = {result} (expected >= {expected})")
                  except Exception as e: print(f"ERROR: {name} - {str(e)[:50]}")
              conn.close()
              EOF
            displayName: 'Run Verification Tests'
            env:
              SNOWFLAKE_ACCOUNT: $(SNOWFLAKE_ACCOUNT)
              SNOWFLAKE_USER: $(SNOWFLAKE_USER)
              SNOWFLAKE_PASSWORD: $(SNOWFLAKE_PASSWORD)
