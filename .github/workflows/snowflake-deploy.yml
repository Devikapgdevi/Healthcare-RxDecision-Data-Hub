name: Snowflake Healthcare CI/CD

on:
  push:
    branches: [main, develop]
    paths: ['sql/**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'development'
        type: choice
        options: [development, production]

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_ROLE: ACCOUNTADMIN
  SNOWFLAKE_WAREHOUSE: COMPUTE_WH

jobs:
  validate:
    name: Validate SQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install sqlfluff
      - run: sqlfluff lint sql/ --dialect snowflake --ignore parsing || true

  deploy:
    name: Deploy to Snowflake
    needs: validate
    runs-on: ubuntu-latest
    # environment: ${{ github.event.inputs.environment || 'development' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install snowflake-connector-python
      - name: Deploy SQL Scripts
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python << 'EOF'
          import snowflake.connector, os
          from pathlib import Path
          conn = snowflake.connector.connect(
              account=os.environ['SNOWFLAKE_ACCOUNT'],
              user=os.environ['SNOWFLAKE_USER'],
              password=os.environ['SNOWFLAKE_PASSWORD'],
              role='ACCOUNTADMIN', warehouse='COMPUTE_WH')
          cursor = conn.cursor()
          for f in sorted(Path('sql').glob('*.sql')):
              if f.name != 'master_deployment.sql':
                  print(f"Executing: {f}")
                  for stmt in [s.strip() for s in f.read_text().split(';') if s.strip()]:
                      if stmt and not stmt.startswith('--'):
                          try: cursor.execute(stmt)
                          except Exception as e: print(f"Warning: {str(e)[:100]}")
          conn.close()
          print("Deployment complete!")
          EOF

  test:
    name: Run Tests
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install snowflake-connector-python
      - name: Run Verification
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python << 'EOF'
          import snowflake.connector, os
          conn = snowflake.connector.connect(
              account=os.environ['SNOWFLAKE_ACCOUNT'],
              user=os.environ['SNOWFLAKE_USER'],
              password=os.environ['SNOWFLAKE_PASSWORD'],
              role='ACCOUNTADMIN', warehouse='COMPUTE_WH')
          cursor = conn.cursor()
          tests = [
              ("PATIENT_RAW", "SELECT COUNT(*) FROM RAW_DB.RAW_SCHEMA.PATIENT_RAW", 500),
              ("ICU_EVENTS", "SELECT COUNT(*) FROM RAW_DB.RAW_SCHEMA.ICU_EVENTS", 1500),
              ("BILLING_DATA", "SELECT COUNT(*) FROM RAW_DB.RAW_SCHEMA.BILLING_DATA", 800),
              ("CLEAN_PATIENT", "SELECT COUNT(*) FROM TRANSFORM_DB.TRANSFORM_SCHEMA.CLEAN_PATIENT", 400),
              ("PATIENT_ANALYTICS", "SELECT COUNT(*) FROM ANALYTICS_DB.ANALYTICS_SCHEMA.PATIENT_ANALYTICS", 400),
              ("PATIENT_NOTES", "SELECT COUNT(*) FROM AI_READY_DB.FEATURE_STORE.PATIENT_NOTES", 400),
          ]
          for name, query, expected in tests:
              try:
                  cursor.execute(query)
                  result = cursor.fetchone()[0]
                  status = "PASS" if result >= expected else "FAIL"
                  print(f"{status}: {name} = {result} (expected >= {expected})")
              except Exception as e: print(f"ERROR: {name} - {str(e)[:50]}")
          conn.close()
          EOF
